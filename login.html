<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusBites- Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
    <h1 class="text-2xl font-bold mb-6 text-center">Login</h1>

    <form id="loginForm" class="space-y-4">
      <div>
        <label for="loginEmail" class="block mb-1 font-medium">Email</label>
        <input
          type="email"
          id="loginEmail"
          class="w-full border rounded-lg px-3 py-2"
          placeholder="Enter your email"
          required
        />
      </div>

      <div>
        <label for="loginPassword" class="block mb-1 font-medium">Password</label>
        <input
          type="password"
          id="loginPassword"
          class="w-full border rounded-lg px-3 py-2"
          placeholder="Enter your password"
          required
        />
      </div>

      <button
        type="submit"
        class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition"
      >
        Sign In
      </button>
    </form>

    <p class="mt-4 text-center text-sm text-gray-600">
      No account?
      <a href="register.html" class="text-indigo-600 font-semibold hover:underline">
        Register
      </a>
    </p>
  </div>

</body>
</html>
