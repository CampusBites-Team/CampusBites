<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusBites- Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <main class="min-h-screen flex items-center justify-center">
    <section aria-labelledby="register-heading" class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
      
      <header class="mb-6">
        <h1 id="register-heading" class="text-2xl font-bold text-center">Create Account</h1>
      </header>

      <form id="registerForm" class="space-y-4">
        <fieldset class="space-y-4">
          <legend class="sr-only">Registration details</legend>

          <section>
            <label for="registerName" class="block mb-1 font-medium">Full Name</label>
            <input
              type="text"
              id="registerName"
              name="registerName"
              class="w-full border rounded-lg px-3 py-2"
              placeholder="Enter your full name"
              required
            />
          </section>

          <section>
            <label for="registerEmail" class="block mb-1 font-medium">Email</label>
            <input
              type="email"
              id="registerEmail"
              name="registerEmail"
              class="w-full border rounded-lg px-3 py-2"
              placeholder="Enter your email"
              required
            />
          </section>

          <section>
            <label for="registerPassword" class="block mb-1 font-medium">Password</label>
            <input
              type="password"
              id="registerPassword"
              name="registerPassword"
              class="w-full border rounded-lg px-3 py-2"
              placeholder="Enter your password"
              required
            />
          </section>

          <section>
            <label for="registerRole" class="block mb-1 font-medium">Role</label>
            <select
              id="registerRole"
              name="registerRole"
              class="w-full border rounded-lg px-3 py-2"
              required
            >
              <option value="">Select your role</option>
              <option value="customer">Customer</option>
              <option value="vendor">Vendor</option>
            </select>
          </section>

          <button
            type="submit"
            class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition"
          >
            Create Account
          </button>
        </fieldset>
      </form>

      <footer class="mt-4 text-center text-sm text-gray-600">
        <p>
          Already have an account?
          <a href="login.html" class="text-indigo-600 font-semibold hover:underline">
            Login
          </a>
        </p>
      </footer>

    </section>
  </main>

</body>
</html>
