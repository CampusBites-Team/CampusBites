<!DOCTYPE html>
<html lang="en">
<head>
  <title>CampusBites - University Food Ordering</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<style>
  .glass-effect {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
  }

  .slide-in {
    animation: slideIn 10s ease-out;
  }

  @keyframes slideIn {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  html {
    scroll-behavior: smooth;
  }
</style>

<body class="bg-gray-50 text-gray-800">

  <nav class="fixed bg-white w-full z-50 glass-effect border-b border-gray-200">
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">

      <header class="flex items-center gap-2 cursor-pointer">
        <i data-lucide="utensils" class="w-8 h-8 text-indigo-600"></i>
        <span class="text-xl font-bold text-gray-900">CampusBites</span>
      </header>

      <section class="md:flex space-x-8">
        <a href="index.html" class="text-gray-700 hover:text-indigo-600">Home</a>
        <a href="browse.html" class="text-gray-700 hover:text-indigo-600">Browse</a>

        <a id="CustomerdashboardLink" href="customer-dashboard.html" class="text-gray-700 hover:text-indigo-600 hidden">
          Dashboard
        </a>

        <a id="VendordashboardLink" href="vendor-dashboard.html" class="text-gray-700 hover:text-indigo-600 hidden">
          Dashboard
        </a>

        <a id="AdmindashboardLink" href="admin-dashboard.html" class="text-gray-700 hover:text-indigo-600 hidden">
          Dashboard
        </a>

        <a id="CustomerProfileLink" href="customer-profile.html" class="text-gray-700 hover:text-indigo-600 hidden">
          My Account
        </a>

        <a id="CheckOutLink" href="checkOut.html" class="text-gray-700 hover:text-indigo-600 hidden">
          Orders
        </a>
      </section>

      <section class="flex items-center gap-4">
        <a
          href="login.html"
          id="loginLink"
          class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition"
        >
          Sign in
        </a>

        <button
          id="logoutBtn"
          class="bg-gray-200 text-gray-800 px-4 py-2 rounded-lg hover:bg-gray-300 transition hidden"
        >
          Logout
        </button>
      </section>

    </section>
  </nav>

  <section class="relative text-white pt-20">

    <section class="absolute inset-0">
      <img src="assets/Matrix.jpg" class="w-full h-full object-cover" alt="Campus background">
    </section>

    <section class="absolute inset-0 bg-black/60"></section>

    <section class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-24">

      <section class="text-center slide-in">

        <h1 class="text-white text-4xl md:text-6xl font-bold mb-6 drop-shadow-lg">
          Skip the Queue,<br>Enjoy Your Meal
        </h1>

        <p class="text-xl mb-8 text-gray-200">
          Order from multiple campus vendors and pick up when ready.
          No more missing classes for lunch!
        </p>

        <section class="flex justify-center gap-4">

          <button
            id="OrderNowButton"
            class="bg-transparent border-2 border-white text-white px-8 py-3 rounded-full font-semibold hover:bg-white hover:text-indigo-600 transition shadow-lg"
          >
            Order Now
          </button>

          <button
            id="LearnButton"
            class="bg-transparent border-2 border-white text-white px-8 py-3 rounded-full font-semibold hover:bg-white hover:text-indigo-600 transition shadow-lg"
          >
            Learn More
          </button>

        </section>

      </section>

    </section>

  </section>

  <script type="module">
    import { initAuthUI, logout } from "./scripts/auth.js";

    initAuthUI();
    lucide.createIcons();

    const orderNow = document.getElementById("OrderNowButton");
    const learn = document.getElementById("LearnButton");

    orderNow?.addEventListener("click", () => {
      window.location.href = "browse.html";
    });

    learn?.addEventListener("click", () => {
      document.getElementById("FeaturesSection")?.scrollIntoView();
    });

    document.getElementById("logoutBtn")?.addEventListener("click", logout);
  </script>

</body>
</html>
